<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Banda</title>
  <meta name="theme-color" content="#121212" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/img/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <span class="logo-text">Minha Banda</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="home" onclick="showView('home')">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Início
      </button>
      <button class="nav-btn" data-view="albums" onclick="showView('albums')">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
        Álbuns
      </button>
      <button class="nav-btn" data-view="all-songs" onclick="showView('all-songs')">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        Todas as Músicas
      </button>
    </nav>
    <div class="offline-badge" id="offlineBadge" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
      Modo Offline
    </div>
  </aside>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <main class="main">
    <header class="topbar">
      <button title="menu" class="menu-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar músicas, álbuns..." oninput="handleSearch(this.value)" />
      </div>
    </header>

    <div class="content">
      <!-- HOME -->
      <div class="view active" id="view-home">
        <h1 class="view-title">Bem-vindo 👋</h1>
        <h2 class="section-title">Álbuns</h2>
        <div class="albums-grid" id="featuredAlbums"></div>
        <h2 class="section-title">Todas as Músicas</h2>
        <div class="songs-list" id="recentSongs"></div>
      </div>

      <!-- ALBUMS -->
      <div class="view" id="view-albums">
        <h1 class="view-title">Álbuns</h1>
        <div class="albums-grid" id="allAlbumsGrid"></div>
      </div>

      <!-- ALBUM DETAIL -->
      <div class="view" id="view-album-detail">
        <button class="back-btn" onclick="showView('albums')">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Voltar
        </button>
        <div class="album-detail-header">
          <div class="album-detail-cover" id="detailCover"></div>
          <div class="album-detail-info">
            <p class="album-label">ÁLBUM</p>
            <h1 id="detailTitle"></h1>
            <p id="detailMeta"></p>
            <button class="play-all-btn" onclick="playAll()">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              Reproduzir tudo
            </button>
          </div>
        </div>
        <div class="songs-list" id="detailSongs"></div>
      </div>

      <!-- ALL SONGS -->
      <div class="view" id="view-all-songs">
        <h1 class="view-title">Todas as Músicas</h1>
        <div class="songs-list" id="allSongsList"></div>
      </div>

      <!-- SEARCH -->
      <div class="view" id="view-search">
        <h1 class="view-title">Resultados</h1>
        <div class="songs-list" id="searchResults"></div>
      </div>
    </div>
  </main>

  <!-- LYRICS PANEL -->
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-header">
      <h3 id="lyricsSongTitle">Letra</h3>
      <button onclick="closeLyrics()">✕</button>
    </div>
    <div class="lyrics-content" id="lyricsContent"></div>
  </div>

  <!-- PLAYER -->
  <footer class="player" id="player">
  <div class="player-track">
    <div class="player-cover" id="playerCover"><span>🎵</span></div>
    <div class="player-info">
      <div class="player-title" id="playerTitle">Nenhuma música</div>
      <div class="player-artist" id="playerArtist">—</div>
    </div>
  </div>

  <!-- Botão de letra FORA do player-track para funcionar no grid mobile -->
  <button class="lyrics-btn" onclick="toggleLyrics()" title="Ver letra">
    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
  </button>

  <div class="player-controls">
    <button title="btn" class="ctrl-btn" onclick="toggleShuffle()" id="shuffleBtn">
      <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
    </button>
    <button title="btn" class="ctrl-btn" onclick="prevTrack()">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>
    <button title="btn" class="ctrl-btn play-btn" onclick="togglePlay()" id="playBtn">
      <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button title="btn" class="ctrl-btn" onclick="nextTrack()">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
    <button title="btn" class="ctrl-btn" onclick="toggleRepeat()" id="repeatBtn">
      <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
    </button>
  </div>

  <div class="player-progress">
    <span id="currentTime">0:00</span>
    <div class="progress-bar" id="progressBar" onclick="seek(event)">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-thumb" id="progressThumb"></div>
    </div>
    <span id="totalTime">0:00</span>
  </div>

  <div class="player-volume">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <input title="volume" type="range" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)" />
  </div>
</footer>

  <audio id="audioPlayer"></audio>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
