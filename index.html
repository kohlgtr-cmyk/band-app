<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EchoDome</title>
  <meta name="theme-color" content="#121212" />
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22EchoDome%20Band%22,%22short_name%22:%22EchoDome%22,%22start_url%22:%22./%22,%22display%22:%22standalone%22,%22background_color%22:%22%23121212%22,%22theme_color%22:%22%23121212%22,%22icons%22:[{%22src%22:%22assets/img/icon-192.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22assets/img/icon-512.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <span class="logo-icon">🎵</span>
      <span class="logo-text">EchoDome</span>
    </div>
    <nav>
      <button class="nav-btn active" onclick="showView('home', this)">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Início
      </button>
      <button class="nav-btn" onclick="showView('albums', this)">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>Álbuns
      </button>
      <button class="nav-btn" onclick="showView('all-songs', this)">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>Músicas
      </button>
    </nav>
    <div id="offlineBadge" class="offline-badge" style="display:none">⚡ Offline</div>
  </aside>

  <!-- OVERLAY MOBILE -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <header class="topbar">
      <button title="btn" class="menu-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="Buscar..." oninput="handleSearch(this.value)" />
      </div>
    </header>

    <div class="content" id="content">

      <!-- HOME -->
      <div class="view active" id="view-home">
        <h1 class="view-title">Início</h1>
        <h2 class="section-title">Álbuns</h2>
        <div class="albums-grid" id="homeAlbums"></div>
        <h2 class="section-title">Todas as músicas</h2>
        <div class="songs-list" id="homeSongs"></div>
      </div>

      <!-- ALBUMS -->
      <div class="view" id="view-albums">
        <h1 class="view-title">Álbuns</h1>
        <div class="albums-grid" id="allAlbums"></div>
      </div>

      <!-- ALBUM DETAIL -->
      <div class="view" id="view-album-detail">
        <button class="back-btn" onclick="showView('albums', null)">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Voltar
        </button>
        <div class="album-hero">
          <div class="album-hero-cover" id="detailCover"></div>
          <div class="album-hero-info">
            <p class="album-label">ÁLBUM</p>
            <h1 id="detailTitle"></h1>
            <p id="detailMeta" style="color:var(--t2);font-size:14px;margin-bottom:20px"></p>
            <button class="btn-green" onclick="playAll()">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Reproduzir tudo
            </button>
          </div>
        </div>
        <div class="songs-list" id="detailSongs"></div>
      </div>

      <!-- ALL SONGS -->
      <div class="view" id="view-all-songs">
        <h1 class="view-title">Todas as Músicas</h1>
        <div class="songs-list" id="allSongsList"></div>
      </div>

      <!-- SEARCH -->
      <div class="view" id="view-search">
        <h1 class="view-title">Resultados</h1>
        <div class="songs-list" id="searchResults"></div>
      </div>

    </div>
  </main>

  <!-- LYRICS PANEL -->
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-header">
      <h3 id="lyricsTitle">Letra</h3>
      <button onclick="closeLyrics()">✕</button>
    </div>
    <div class="lyrics-body" id="lyricsBody"></div>
  </div>

  <!-- ============================================================
       PLAYER — estrutura simples, sem grid
  ============================================================ -->
  <div class="player" id="player">

    <!-- Linha 1: capa + info + botão letra -->
    <div class="player-row player-row-info">
      <div class="p-cover" id="pCover"><span>🎵</span></div>
      <div class="p-meta">
        <div class="p-title" id="pTitle">Nenhuma música</div>
        <div class="p-artist" id="pArtist">—</div>
      </div>
      <button title="btn" class="p-icon-btn" onclick="toggleLyrics()" id="lyricsBtn">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
      </button>
    </div>

    <!-- Linha 2: progress bar -->
    <div class="player-row player-row-progress">
      <span class="p-time" id="pCurrent">0:00</span>
      <div class="p-bar" id="pBar" onclick="seek(event)">
        <div class="p-bar-fill" id="pFill"></div>
        <div class="p-bar-thumb" id="pThumb"></div>
      </div>
      <span class="p-time" id="pTotal">0:00</span>
    </div>

    <!-- Linha 3: controles -->
    <div class="player-row player-row-controls">
      <button title="btn" class="p-icon-btn" onclick="toggleShuffle()" id="shuffleBtn">
        <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button title="btn" class="p-icon-btn" onclick="prevTrack()">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button title="btn" class="p-play-btn" onclick="togglePlay()" id="playBtn">
        <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button title="btn" class="p-icon-btn" onclick="nextTrack()">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button title="btn" class="p-icon-btn" onclick="toggleRepeat()" id="repeatBtn">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>

    <!-- Volume (só desktop) -->
    <div class="player-row player-row-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <input title="volume" type="range" id="volSlider" min="0" max="100" value="80" oninput="setVolume(this.value)" />
    </div>

  </div><!-- /player -->

  <audio id="audio"></audio>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
